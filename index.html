<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>Nexus IA — Assistente Generativo</title>
  <meta name="description" content="Assistente de IA generativa com os melhores modelos via Groq">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a10; font-family: 'DM Sans', -apple-system, sans-serif; }
    #root { min-height: 100vh; }
    #loading {
      position: fixed; inset: 0; background: #0a0a10;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 9999; transition: opacity 0.4s ease;
    }
    #loading .logo {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, #e8c96d, #c9a84c, #8b6914);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; animation: pulse 1.5s ease infinite;
      box-shadow: 0 10px 40px rgba(201,168,76,0.3);
    }
    #loading .text { font-family: 'Playfair Display', serif; font-size: 26px; color: #c9a84c; font-weight: 900; letter-spacing: -0.5px; }
    #loading .sub { font-size: 12px; color: #8a8799; letter-spacing: 0.5px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">✦</div>
    <div class="text">Nexus IA</div>
    <div class="sub">Carregando...</div>
  </div>
  <div id="root"></div>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="app.js"></script>

  <script>
    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(window.__NexusIA));
      setTimeout(() => {
        const l = document.getElementById('loading');
        if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 400); }
      }, 600);
    } catch(e) {
      document.getElementById('loading').innerHTML =
        '<div style="color:#e05c5c;font-family:monospace;padding:20px;max-width:600px;text-align:center">' +
        '<div style="font-size:32px;margin-bottom:12px">⚠️</div>' +
        '<div style="font-size:14px">Erro ao inicializar: ' + e.message + '</div></div>';
      console.error(e);
    }
  </script>
</body>
</html>
